spring.application.name=sms-backend

# ── Database ──────────────────────────────────────────────────────────────────
# In production move these values to environment variables / .env file
spring.datasource.url=jdbc:postgresql://localhost:5432/sms_db
spring.datasource.username=sms
spring.datasource.password=password

# ── Hibernate / JPA ───────────────────────────────────────────────────────────
# 'update' = Hibernate creates/updates tables automatically on startup
# Change to 'validate' in production so Hibernate never modifies the schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret key: must be a Base64-encoded string, at least 32 characters long
# IMPORTANT: change this to a long random string before deploying
# You can generate one at: https://generate.plus/en/base64
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000